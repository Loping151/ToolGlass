name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tool-glass-x86_64-unknown-linux-gnu.tar.gz
            use-cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tool-glass-aarch64-unknown-linux-gnu.tar.gz
            use-cross: true
          - target: x86_64-apple-darwin
            os: macos-14
            archive: tool-glass-x86_64-apple-darwin.tar.gz
            use-cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tool-glass-aarch64-apple-darwin.tar.gz
            use-cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: tool-glass-x86_64-pc-windows-msvc.zip
            use-cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        uses: taiki-e/install-action@cross

      - name: Build release binary
        shell: bash
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/tool-glass-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/tool-glass dist/tool-glass-${{ matrix.target }}/
          cp LICENSE dist/tool-glass-${{ matrix.target }}/
          tar -C dist -czf dist/${{ matrix.archive }} tool-glass-${{ matrix.target }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/tool-glass-${{ matrix.target }}
          Copy-Item target/${{ matrix.target }}/release/tool-glass.exe dist/tool-glass-${{ matrix.target }}/
          Copy-Item LICENSE dist/tool-glass-${{ matrix.target }}/
          Compress-Archive -Path dist/tool-glass-${{ matrix.target }}/* -DestinationPath dist/${{ matrix.archive }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/${{ matrix.archive }}
